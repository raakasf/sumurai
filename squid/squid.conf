# Egress-only proxy: permits HTTPS tunneling to teller.io exclusively.
# The backend container has no internet route of its own (internal Docker network).
# All outbound HTTPS must flow through this proxy, which blocks everything
# except api.teller.io.

http_port 3128

# Only HTTPS CONNECT tunnels to teller.io are permitted.
# Plaid, any other SaaS, or raw IP connections are denied.
acl CONNECT method CONNECT
acl teller_io dstdomain .teller.io

# Block connections to RFC-1918 ranges to prevent SSRF via the proxy.
acl rfc1918 dst 10.0.0.0/8
acl rfc1918 dst 172.16.0.0/12
acl rfc1918 dst 192.168.0.0/16
acl rfc1918 dst 127.0.0.0/8
http_access deny rfc1918

http_access allow CONNECT teller_io
http_access deny all

# Never cache — this proxy handles financial API traffic.
cache deny all

# Strip identifying headers so teller.io does not see internal topology.
forwarded_for delete
via off

# Squid runs as its own user; no elevated privileges needed.
